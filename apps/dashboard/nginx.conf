server {
  listen 80;
  server_name _;
  include /etc/nginx/conf.d/dashboard-auth.conf;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    auth_basic off;
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
