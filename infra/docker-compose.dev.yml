services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: gonvex-valkey-dev
    command: valkey-server --maxmemory 1gb --maxmemory-policy allkeys-lfu --appendonly no --save ""
    ports:
      - "6380:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    container_name: gonvex-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  valkey-data:
  minio-data:
