services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gonvex_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gonvex_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --maxmemory 1gb --maxmemory-policy allkeys-lfu --appendonly no --save ""
    ports:
      - "6380:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_BUCKET: gonvex-dev
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
    restart: "no"

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      GONVEX_ADDR: 0.0.0.0:8080
      GONVEX_LANDLORD_DATABASE_URL: postgres://postgres:postgres@postgres:5432/gonvex_dev?sslmode=disable
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gonvex_dev?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
      GONVEX_PLUGIN_CACHE_DIR: /var/lib/gonvex/plugins
      GONVEX_TELEMETRY_LOG: /var/lib/gonvex/telemetry.jsonl
      GONVEX_ROWS_CACHE_TTL: 15s
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: gonvex-dev
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      GONVEX_PUBLIC_URL: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - runtime-data:/var/lib/gonvex
    healthcheck:
      test:
        - CMD-SHELL
        - |
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; grep -q "200 OK" <&3'
      interval: 5s
      timeout: 5s
      retries: 30

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        VITE_GONVEX_URL: http://localhost:8080
        VITE_GONVEX_RUNTIME_URL: http://localhost:8080
        VITE_GONVEX_AUTH_ENABLED: "false"
        VITE_GONVEX_EMAIL_LOGIN_ENABLED: "false"
        VITE_GONVEX_GOOGLE_LOGIN_ENABLED: "false"
        VITE_GONVEX_ALLOW_UNLISTED_EMAILS: "true"
    restart: unless-stopped
    depends_on:
      runtime:
        condition: service_healthy
    environment:
      DASHBOARD_AUTH_ENABLED: "false"
      DASHBOARD_COOKIE_SECURE: "false"
      GONVEX_RUNTIME_URL: http://runtime:8080
      VITE_GONVEX_RUNTIME_URL: http://localhost:8080
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  valkey-data:
  minio-data:
  runtime-data:
